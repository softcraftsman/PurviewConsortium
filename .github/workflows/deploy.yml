name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  build_and_test:
    name: Build and Test API
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore PurviewConsortium.sln

      - name: Build solution
        run: dotnet build PurviewConsortium.sln --no-restore -c Release

      - name: Run tests
        run: dotnet test PurviewConsortium.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

      - name: Publish API
        run: dotnet publish src/PurviewConsortium.Api/PurviewConsortium.Api.csproj -c Release -o api-publish --no-build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: api-publish
          retention-days: 1

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/PurviewConsortium.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/PurviewConsortium.Web
        run: npm ci

      - name: Build
        working-directory: src/PurviewConsortium.Web
        env:
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Include Static Web App config in build output
        run: cp src/PurviewConsortium.Web/staticwebapp.config.json src/PurviewConsortium.Web/dist/staticwebapp.config.json

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: src/PurviewConsortium.Web/dist
          retention-days: 1

  deploy_api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build_and_test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: api-publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api-publish
      # EF Core database migrations are applied automatically on startup
      # via db.Database.Migrate() in Program.cs (Production environment only).

  deploy_web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: build_web
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: src/PurviewConsortium.Web/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/PurviewConsortium.Web/dist
          output_location: ""
          skip_app_build: true

  close_pull_request:
    name: Close Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions: {}
    environment:
      name: production

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          app_location: src/PurviewConsortium.Web
